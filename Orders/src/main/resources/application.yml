server:
  port: 9010
spring:
  application:
    name: "Orders"
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  cloud:
    function:
      definition: paymentConfirmed;orderCreatedSupplier   # must be semicolon separated
    stream:
      kafka:
        binder:
          brokers: localhost:9092
      bindings:
        orderCreatedSupplier-out-0:
          destination: order.created
        paymentConfirmed-in-0:
          destination: payment.confirmed
          group: order-group

management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka

info:
  app:
    name: "Orders Service"
    description: "eCommerce Orders Service"
    version: "1.0.0"

logging:
  level:
    org.springframework.cloud.stream: WARN
    org.springframework.integration: WARN
    org.apache.kafka: WARN